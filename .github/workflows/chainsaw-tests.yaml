name: Run Chainsaw tests

on:
  pull_request:
    branches: [ main ]

jobs:
  chainsaw-test:
    name: Run Chainsaw tests
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
    - name: Create k8s Kind Cluster
      uses: helm/kind-action@v1

    - uses: actions/checkout@v6

    - name: Install Dependencies
      shell: bash
      env:
        ENABLE_COVERAGE: "true"
      run: ./hack/e2e_tests.sh

    - name: Install Cosign
      uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1

    - name: Install Chainsaw
      uses: kyverno/action-install-chainsaw@06560d18422209e9c1e08e931d477d04bf2674c1  # v0.2.14
      with:
        verify: true

    - name: Run chainsaw
      shell: bash
      run: chainsaw test --no-color=false acceptance/

    - name: Collect e2e coverage
      if: always()
      run: |
        mkdir -p coverage-output && chmod 777 coverage-output
        cp $HOME/.kube/config /tmp/kubeconfig && chmod 644 /tmp/kubeconfig
        podman run --rm \
          --network host \
          -v /tmp/kubeconfig:/kubeconfig:ro \
          -v $PWD/coverage-output:/workspace/coverage-output \
          -e KUBECONFIG=/kubeconfig \
          quay.io/konflux-ci/konflux-devprod/coverport-cli@sha256:9a2d0a42fcc0dcea31c1b20b2752bb4dfe76f92a99314968e24f525c782a03f1 \
          collect \
            --namespace=etcd-shield \
            --label-selector=app=etcd-shield \
            --test-name=e2e-tests \
            --output=/workspace/coverage-output || true

    - name: Upload e2e coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v5
      with:
        use_oidc: true
        flags: e2e-tests
        directory: coverage-output
        fail_ci_if_error: false
